name: Bug report
description: Report a reproducible problem with Facebook Messenger Desktop
title: "[BUG] "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include passwords, cookies, tokens, private messages, account identifiers, or unredacted debug logs.

  - type: input
    id: app_version
    attributes:
      label: App version
      description: Find this in the About dialog or installed package metadata.
      placeholder: 1.3.1-beta.40
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Release channel
      options:
        - Stable
        - Beta
        - Development build
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: operating_system
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Ubuntu or Debian
        - Fedora or RPM-based Linux
        - Other Linux
    validations:
      required: true

  - type: input
    id: os_version_arch
    attributes:
      label: OS version and architecture
      placeholder: macOS 15.5 arm64, Windows 11 x64, Ubuntu 24.04 x64
    validations:
      required: true

  - type: input
    id: install_method
    attributes:
      label: Installation method
      placeholder: GitHub zip, Homebrew, Windows installer, AppImage, deb, rpm, Flatpak, or Snap
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Give the smallest reliable sequence and say how often it happens.
      placeholder: |
        1. Start the app...
        2. Open...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Paste only the relevant lines. Remove names, message contents, thread IDs, cookies, tokens, and account identifiers.
      render: text

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I checked this report and its attachments for private messages, account data, cookies, tokens, and other secrets.
          required: true
