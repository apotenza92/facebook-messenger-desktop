name: Snap Security Refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SNAP_NAME: facebook-messenger-desktop

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: "Snap version to refresh. Leave empty to use package.json from this ref."
        required: false
        type: string
      minimum_amd64_revision:
        description: "Wait until latest/edge amd64 is newer than this affected revision. Leave empty to compare against latest/beta."
        required: false
        type: string
      minimum_arm64_revision:
        description: "Wait until latest/edge arm64 is newer than this affected revision. Leave empty to compare against latest/beta."
        required: false
        type: string
      wait_attempts:
        description: "Number of status polls while waiting for rebuilt edge revisions."
        required: false
        default: "48"
        type: string
      wait_seconds:
        description: "Seconds between status polls."
        required: false
        default: "150"
        type: string

concurrency:
  group: snap-security-refresh
  cancel-in-progress: false

jobs:
  promote_rebuilt_edge_to_beta:
    name: Promote rebuilt edge revisions to beta
    runs-on: ubuntu-latest
    environment: snap-beta-promotion
    timeout-minutes: 140

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Resolve and validate inputs
        id: inputs
        env:
          EXPECTED_VERSION_INPUT: ${{ github.event.inputs.expected_version }}
          MINIMUM_AMD64_REVISION_INPUT: ${{ github.event.inputs.minimum_amd64_revision }}
          MINIMUM_ARM64_REVISION_INPUT: ${{ github.event.inputs.minimum_arm64_revision }}
          WAIT_ATTEMPTS_INPUT: ${{ github.event.inputs.wait_attempts }}
          WAIT_SECONDS_INPUT: ${{ github.event.inputs.wait_seconds }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          expected_version="$EXPECTED_VERSION_INPUT"
          minimum_amd64_revision="$MINIMUM_AMD64_REVISION_INPUT"
          minimum_arm64_revision="$MINIMUM_ARM64_REVISION_INPUT"
          wait_attempts="$WAIT_ATTEMPTS_INPUT"
          wait_seconds="$WAIT_SECONDS_INPUT"

          if [ -z "$expected_version" ]; then
            expected_version="$package_version"
          fi

          if [ -z "$wait_attempts" ]; then
            wait_attempts="48"
          fi

          if [ -z "$wait_seconds" ]; then
            wait_seconds="150"
          fi

          for value_name in wait_attempts wait_seconds; do
            value="${!value_name}"
            if ! [[ "$value" =~ ^[0-9]+$ ]]; then
              echo "Input $value_name must be a non-negative integer; got '$value'." >&2
              exit 1
            fi
          done

          if [ "$wait_attempts" -lt 1 ]; then
            echo "wait_attempts must be at least 1." >&2
            exit 1
          fi

          if [ "$wait_seconds" -lt 1 ]; then
            echo "wait_seconds must be at least 1." >&2
            exit 1
          fi

          {
            echo "expected_version=$expected_version"
            echo "minimum_amd64_revision=$minimum_amd64_revision"
            echo "minimum_arm64_revision=$minimum_arm64_revision"
            echo "wait_attempts=$wait_attempts"
            echo "wait_seconds=$wait_seconds"
          } >>"$GITHUB_OUTPUT"

          echo "Refreshing Snap version $expected_version"
          if [ -n "$minimum_amd64_revision" ] || [ -n "$minimum_arm64_revision" ]; then
            for value_name in minimum_amd64_revision minimum_arm64_revision; do
              value="${!value_name}"
              if ! [[ "$value" =~ ^[0-9]+$ ]]; then
                echo "Input $value_name must be a non-negative integer when provided; got '$value'." >&2
                exit 1
              fi
            done
            echo "Waiting for edge revisions newer than amd64 r$minimum_amd64_revision and arm64 r$minimum_arm64_revision"
          else
            echo "No revision floor provided; automatic mode will compare latest/edge against latest/beta."
          fi

      - name: Wait for rebuilt edge revisions
        id: edge
        env:
          EXPECTED_VERSION: ${{ steps.inputs.outputs.expected_version }}
          MINIMUM_AMD64_REVISION: ${{ steps.inputs.outputs.minimum_amd64_revision }}
          MINIMUM_ARM64_REVISION: ${{ steps.inputs.outputs.minimum_arm64_revision }}
          WAIT_ATTEMPTS: ${{ steps.inputs.outputs.wait_attempts }}
          WAIT_SECONDS: ${{ steps.inputs.outputs.wait_seconds }}
        run: |
          set -euo pipefail

          snap_info_url="https://api.snapcraft.io/v2/snaps/info/${SNAP_NAME}"
          explicit_revision_floor=false

          if [ -n "$MINIMUM_AMD64_REVISION" ] || [ -n "$MINIMUM_ARM64_REVISION" ]; then
            explicit_revision_floor=true
          fi

          fetch_snap_info() {
            local body_file status fetch_attempt sleep_seconds
            body_file="$(mktemp)"

            for fetch_attempt in 1 2 3 4; do
              status="$(curl -sS -L -H "Snap-Device-Series: 16" -o "$body_file" -w "%{http_code}" "$snap_info_url" || true)"

              if [ "$status" = "200" ]; then
                cat "$body_file"
                rm -f "$body_file"
                return 0
              fi

              if [ "$status" = "429" ]; then
                sleep_seconds=$((fetch_attempt * 20))
                echo "Snapcraft info API returned HTTP 429 on fetch attempt ${fetch_attempt}/4; retrying in ${sleep_seconds}s." >&2
                sleep "$sleep_seconds"
                continue
              fi

              echo "Snapcraft info API returned HTTP $status." >&2
              cat "$body_file" >&2 || true
              rm -f "$body_file"
              return 1
            done

            rm -f "$body_file"
            return 75
          }

          for attempt in $(seq 1 "$WAIT_ATTEMPTS"); do
            fetch_status=0
            info="$(fetch_snap_info)" || fetch_status=$?

            if [ "$fetch_status" -ne 0 ]; then
              echo "Snapcraft info API is unavailable; refusing to make a promotion decision." >&2
              exit "$fetch_status"
            fi

            edge_amd64_revision="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "edge" and .channel.architecture == "amd64") | .revision' <<<"$info")"
            edge_arm64_revision="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "edge" and .channel.architecture == "arm64") | .revision' <<<"$info")"
            edge_amd64_version="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "edge" and .channel.architecture == "amd64") | .version' <<<"$info")"
            edge_arm64_version="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "edge" and .channel.architecture == "arm64") | .version' <<<"$info")"
            beta_amd64_revision="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "amd64") | .revision' <<<"$info")"
            beta_arm64_revision="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "arm64") | .revision' <<<"$info")"
            beta_amd64_version="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "amd64") | .version' <<<"$info")"
            beta_arm64_version="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "arm64") | .version' <<<"$info")"
            minimum_amd64_revision="$MINIMUM_AMD64_REVISION"
            minimum_arm64_revision="$MINIMUM_ARM64_REVISION"

            echo "Attempt ${attempt}/${WAIT_ATTEMPTS}: edge amd64=${edge_amd64_version} r${edge_amd64_revision}, arm64=${edge_arm64_version} r${edge_arm64_revision}"
            echo "Attempt ${attempt}/${WAIT_ATTEMPTS}: beta amd64=${beta_amd64_version} r${beta_amd64_revision}, arm64=${beta_arm64_version} r${beta_arm64_revision}"

            if [ "$explicit_revision_floor" = false ]; then
              if [ "$beta_amd64_version" != "$EXPECTED_VERSION" ] || [ "$beta_arm64_version" != "$EXPECTED_VERSION" ]; then
                echo "latest/beta is not $EXPECTED_VERSION for both architectures; normal Snap promotion should handle version promotion first."
                {
                  echo "refresh_needed=false"
                  echo "skip_reason=beta-version-mismatch"
                } >>"$GITHUB_OUTPUT"
                exit 0
              fi

              minimum_amd64_revision="$beta_amd64_revision"
              minimum_arm64_revision="$beta_arm64_revision"
            fi

            if ! [[ "$minimum_amd64_revision" =~ ^[0-9]+$ ]] || ! [[ "$minimum_arm64_revision" =~ ^[0-9]+$ ]]; then
              echo "Cannot determine numeric revision floor for both architectures." >&2
              if [ "$explicit_revision_floor" = true ]; then
                exit 1
              fi
              {
                echo "refresh_needed=false"
                echo "skip_reason=missing-beta-revision"
              } >>"$GITHUB_OUTPUT"
              exit 0
            fi

            if [[ "$edge_amd64_revision" =~ ^[0-9]+$ ]] &&
              [[ "$edge_arm64_revision" =~ ^[0-9]+$ ]] &&
              [ "$edge_amd64_version" = "$EXPECTED_VERSION" ] &&
              [ "$edge_arm64_version" = "$EXPECTED_VERSION" ] &&
              [ "$edge_amd64_revision" -gt "$minimum_amd64_revision" ] &&
              [ "$edge_arm64_revision" -gt "$minimum_arm64_revision" ]; then
              {
                echo "refresh_needed=true"
                echo "amd64_revision=$edge_amd64_revision"
                echo "arm64_revision=$edge_arm64_revision"
              } >>"$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$attempt" -lt "$WAIT_ATTEMPTS" ]; then
              sleep "$WAIT_SECONDS"
            fi
          done

          if [ "$explicit_revision_floor" = true ]; then
            echo "Timed out waiting for rebuilt edge revisions for $EXPECTED_VERSION." >&2
            exit 1
          fi

          echo "No rebuilt latest/edge revisions are ready to refresh latest/beta."
          {
            echo "refresh_needed=false"
            echo "skip_reason=edge-not-newer"
          } >>"$GITHUB_OUTPUT"

      - name: Install Snapcraft
        if: steps.edge.outputs.refresh_needed == 'true'
        run: sudo snap install snapcraft --classic

      - name: Release exact rebuilt revisions to beta
        if: steps.edge.outputs.refresh_needed == 'true'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAPCRAFT_HAS_TTY: "true"
          AMD64_REVISION: ${{ steps.edge.outputs.amd64_revision }}
          ARM64_REVISION: ${{ steps.edge.outputs.arm64_revision }}
        run: |
          set -euo pipefail

          echo "Releasing amd64 revision $AMD64_REVISION to beta..."
          yes | snapcraft release "$SNAP_NAME" "$AMD64_REVISION" beta

          echo "Releasing arm64 revision $ARM64_REVISION to beta..."
          yes | snapcraft release "$SNAP_NAME" "$ARM64_REVISION" beta

      - name: Verify beta points at rebuilt revisions
        if: steps.edge.outputs.refresh_needed == 'true'
        env:
          EXPECTED_VERSION: ${{ steps.inputs.outputs.expected_version }}
          AMD64_REVISION: ${{ steps.edge.outputs.amd64_revision }}
          ARM64_REVISION: ${{ steps.edge.outputs.arm64_revision }}
        run: |
          set -euo pipefail

          snap_info_url="https://api.snapcraft.io/v2/snaps/info/${SNAP_NAME}"
          info="$(curl -fsSL -H "Snap-Device-Series: 16" "$snap_info_url")"

          beta_amd64_revision="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "amd64") | .revision' <<<"$info")"
          beta_arm64_revision="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "arm64") | .revision' <<<"$info")"
          beta_amd64_version="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "amd64") | .version' <<<"$info")"
          beta_arm64_version="$(jq -r '.["channel-map"][] | select(.channel.track == "latest" and .channel.risk == "beta" and .channel.architecture == "arm64") | .version' <<<"$info")"

          echo "Beta amd64=${beta_amd64_version} r${beta_amd64_revision}"
          echo "Beta arm64=${beta_arm64_version} r${beta_arm64_revision}"

          test "$beta_amd64_version" = "$EXPECTED_VERSION"
          test "$beta_arm64_version" = "$EXPECTED_VERSION"
          test "$beta_amd64_revision" = "$AMD64_REVISION"
          test "$beta_arm64_revision" = "$ARM64_REVISION"
