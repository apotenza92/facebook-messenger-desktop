name: Snap ARM64 Rescue Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected package.json/snap version
        required: true
        default: 1.3.1-beta.15
      release_channels:
        description: Optional comma-separated channels to upload/release to, e.g. edge or beta,edge
        required: false
        default: ""

jobs:
  build-arm64:
    name: Build ARM64 snap
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Verify runner and version
        run: |
          set -euo pipefail
          test "$(dpkg --print-architecture)" = "arm64"
          version="$(node -p "require('./package.json').version")"
          test "$version" = "${{ inputs.expected_version }}"

      - name: Install build tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          sudo snap install snapcraft --classic --channel=7.x/stable

      - name: Build snap
        run: |
          set -euo pipefail
          snapcraft --destructive-mode --build-for arm64

      - name: Inspect snap
        id: snap
        run: |
          set -euo pipefail
          snap_file="$(ls facebook-messenger-desktop_*_arm64.snap | head -n 1)"
          test -n "$snap_file"
          unsquashfs -cat "$snap_file" meta/snap.yaml > /tmp/snap-meta.yaml
          grep -Fx "name: facebook-messenger-desktop" /tmp/snap-meta.yaml
          grep -Ex "version: '?${{ inputs.expected_version }}'?" /tmp/snap-meta.yaml
          echo "snap_file=$snap_file" >> "$GITHUB_OUTPUT"

      - name: Upload snap artifact
        uses: actions/upload-artifact@v6
        with:
          name: facebook-messenger-desktop-${{ inputs.expected_version }}-arm64-snap
          path: ${{ steps.snap.outputs.snap_file }}

      - name: Upload and release snap
        if: inputs.release_channels != ''
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          set -euo pipefail
          snapcraft upload "${{ steps.snap.outputs.snap_file }}" --release "${{ inputs.release_channels }}"

      - name: Final Snap status
        if: inputs.release_channels != ''
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: snapcraft status facebook-messenger-desktop
