name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: messenger-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic:
    name: Static checks and deterministic tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Run required checks
        run: npm run test:ci
